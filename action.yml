name: "Passkey Login"
description: "Reusable GitHub Action to obtain an ESTS authentication cookie from an Entra passkey, preferring Azure Key Vault-backed signing and falling back to a local private key."
author: "nathanmcnulty"
inputs:
  credential-id:
    description: 'FIDO2 CredentialId (base64url or UUID)'
    required: true
  private-key:
    description: 'Local private key in PEM format or base64 encoded. Prefer Azure Key Vault instead.'
    required: false
  user-handle:
    description: 'FIDO2 UserHandle (base64url)'
    required: true
  user-principal-name:
    description: 'User principal name (UPN) to authenticate (e.g. user@domain.com)'
    required: true
  key-vault-name:
    description: 'Azure Key Vault name holding the signing key for the passkey.'
    required: false
  key-vault-key-name:
    description: 'Azure Key Vault key name used to sign the passkey assertion.'
    required: false
  key-vault-access-token:
    description: 'Pre-obtained Key Vault access token. Usually not needed when azure/login has already run.'
    required: false
  key-vault-client-id:
    description: 'Fallback service principal client ID for Key Vault access when not using azure/login.'
    required: false
  key-vault-client-secret:
    description: 'Fallback service principal client secret for Key Vault access when not using azure/login.'
    required: false
  key-vault-tenant-id:
    description: 'Tenant ID for Azure CLI token scoping or service principal fallback.'
    required: false
  auth-url:
    description: 'Optional override for the Entra authorize URL.'
    required: false
  proxy:
    description: 'Optional proxy URL for outbound requests.'
    required: false
  export-auth-cookie:
    description: 'When true, masks and exports the authenticated ESTS cookie as an action output for later steps. Enabled by default because this action exists to obtain that cookie.'
    required: false
    default: 'true'
outputs:
  authenticated:
    description: 'True when the script verified an authenticated ESTS cookie.'
    value: ${{ steps.run-passkey.outputs.authenticated }}
  cookie-name:
    description: 'The ESTS cookie name returned by Entra when authentication succeeds.'
    value: ${{ steps.run-passkey.outputs.cookie-name }}
  user-principal-name:
    description: 'The authenticated user principal name.'
    value: ${{ steps.run-passkey.outputs.user-principal-name }}
  signature-method:
    description: 'The signature method used for the FIDO assertion.'
    value: ${{ steps.run-passkey.outputs.signature-method }}
  key-vault-name:
    description: 'The Key Vault used for signing, when applicable.'
    value: ${{ steps.run-passkey.outputs.key-vault-name }}
  auth-cookie:
    description: 'The masked ESTS cookie value when export-auth-cookie is true.'
    value: ${{ steps.run-passkey.outputs.auth-cookie }}
branding:
  icon: lock
  color: blue

runs:
  using: "composite"
  steps:
    - name: Verify embedded script
      shell: pwsh
      run: |
        $script = Join-Path $env:GITHUB_ACTION_PATH 'PasskeyLogin.ps1'
        if (-not (Test-Path $script)) {
          Write-Error "Embedded script not found: $script"
          exit 1
        }

    - name: Run PasskeyLogin.ps1
      id: run-passkey
      shell: pwsh
      env:
        CREDENTIAL_ID: ${{ inputs.credential-id }}
        PRIVATE_KEY: ${{ inputs.private-key }}
        USER_HANDLE: ${{ inputs.user-handle }}
        USER_PRINCIPAL_NAME: ${{ inputs.user-principal-name }}
        KEY_VAULT_NAME: ${{ inputs.key-vault-name }}
        KEY_VAULT_KEY_NAME: ${{ inputs.key-vault-key-name }}
        KEY_VAULT_ACCESS_TOKEN: ${{ inputs.key-vault-access-token }}
        KEY_VAULT_CLIENT_ID: ${{ inputs.key-vault-client-id }}
        KEY_VAULT_CLIENT_SECRET: ${{ inputs.key-vault-client-secret }}
        KEY_VAULT_TENANT_ID: ${{ inputs.key-vault-tenant-id }}
        AUTH_URL: ${{ inputs.auth-url }}
        PROXY: ${{ inputs.proxy }}
        EXPORT_AUTH_COOKIE: ${{ inputs.export-auth-cookie }}
      run: |
        $script = Join-Path $env:GITHUB_ACTION_PATH 'PasskeyLogin.ps1'

        function Set-ActionOutput {
          param(
            [Parameter(Mandatory)]
            [string]$Name,
            [AllowNull()]
            [string]$Value
          )

          $delimiter = [guid]::NewGuid().ToString('N')
          Add-Content -Path $env:GITHUB_OUTPUT -Value "$Name<<$delimiter"
          Add-Content -Path $env:GITHUB_OUTPUT -Value ($Value ?? '')
          Add-Content -Path $env:GITHUB_OUTPUT -Value $delimiter
        }

        foreach ($sensitiveValue in @(
          $env:CREDENTIAL_ID,
          $env:USER_HANDLE,
          $env:PRIVATE_KEY,
          $env:KEY_VAULT_ACCESS_TOKEN,
          $env:KEY_VAULT_CLIENT_SECRET
        )) {
          if (-not [string]::IsNullOrWhiteSpace($sensitiveValue)) {
            Write-Output "::add-mask::$sensitiveValue"
          }
        }

        $useLocalPrivateKey = -not [string]::IsNullOrWhiteSpace($env:PRIVATE_KEY)
        $hasAnyKeyVaultConfig = @(
          $env:KEY_VAULT_NAME,
          $env:KEY_VAULT_KEY_NAME,
          $env:KEY_VAULT_ACCESS_TOKEN,
          $env:KEY_VAULT_CLIENT_ID,
          $env:KEY_VAULT_CLIENT_SECRET,
          $env:KEY_VAULT_TENANT_ID
        ) | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
        $hasCompleteKeyVaultConfig = (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_NAME)) -and (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_KEY_NAME))

        if (-not $useLocalPrivateKey -and -not $hasCompleteKeyVaultConfig) {
          throw 'A signing method is required. Prefer key-vault-name plus key-vault-key-name, or supply private-key for local testing only.'
        }

        if ($hasAnyKeyVaultConfig -and -not $hasCompleteKeyVaultConfig) {
          throw 'Incomplete Key Vault configuration detected. Provide both key-vault-name and key-vault-key-name, or remove the Key Vault inputs and use private-key only.'
        }

        if ($hasCompleteKeyVaultConfig -and $useLocalPrivateKey) {
          Write-Warning 'Key Vault inputs were provided, so the action will use Azure Key Vault and ignore private-key.'
        }

        if (-not $hasCompleteKeyVaultConfig) {
          Write-Warning 'Using private-key fallback. This is less secure than Azure Key Vault-backed signing and should be limited to testing or tightly controlled automation.'
        }

        $params = @{
          UserPrincipalName = $env:USER_PRINCIPAL_NAME
          UserHandle = $env:USER_HANDLE
          CredentialId = $env:CREDENTIAL_ID
          PassThru = $true
        }

        if (-not [string]::IsNullOrWhiteSpace($env:AUTH_URL)) {
          $params.AuthUrl = $env:AUTH_URL
        }

        if (-not [string]::IsNullOrWhiteSpace($env:PROXY)) {
          $params.Proxy = $env:PROXY
        }

        if ($hasCompleteKeyVaultConfig) {
          $params.KeyVaultName = $env:KEY_VAULT_NAME
          $params.KeyVaultKeyName = $env:KEY_VAULT_KEY_NAME

          if (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_ACCESS_TOKEN)) {
            $params.KeyVaultAccessToken = $env:KEY_VAULT_ACCESS_TOKEN
          }
          if (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_CLIENT_ID)) {
            $params.KeyVaultClientId = $env:KEY_VAULT_CLIENT_ID
          }
          if (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_CLIENT_SECRET)) {
            $params.KeyVaultClientSecret = $env:KEY_VAULT_CLIENT_SECRET
          }
          if (-not [string]::IsNullOrWhiteSpace($env:KEY_VAULT_TENANT_ID)) {
            $params.KeyVaultTenantId = $env:KEY_VAULT_TENANT_ID
          }
        } else {
          $params.PrivateKey = $env:PRIVATE_KEY
        }

        if ($env:EXPORT_AUTH_COOKIE -ne 'false') {
          $params.IncludeAuthenticationCookie = $true
        }

        $result = & $script @params
        if ($result -is [array]) {
          $result = $result[-1]
        }

        if (-not $result) {
          throw 'PasskeyLogin.ps1 did not return a result object.'
        }

        if ($result.AuthenticationCookieValue) {
          Write-Output "::add-mask::$($result.AuthenticationCookieValue)"
        }

        Set-ActionOutput -Name authenticated -Value ([string]$result.Success).ToLowerInvariant()
        Set-ActionOutput -Name cookie-name -Value $result.AuthenticationCookieName
        Set-ActionOutput -Name user-principal-name -Value $result.UserPrincipalName
        Set-ActionOutput -Name signature-method -Value $result.SignatureMethod
        Set-ActionOutput -Name key-vault-name -Value $result.KeyVaultName
        Set-ActionOutput -Name auth-cookie -Value $result.AuthenticationCookieValue
